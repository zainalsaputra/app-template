name: Bug report
description: Report a reproducible chart problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: chart-version
    attributes:
      label: Chart version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: kubernetes-version
    attributes:
      label: Kubernetes version
      placeholder: 1.31.0
    validations:
      required: true
  - type: textarea
    id: values
    attributes:
      label: Relevant values
      description: Remove credentials and other sensitive data.
      render: yaml
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

