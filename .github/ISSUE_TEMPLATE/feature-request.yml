name: Feature request
description: Propose a reusable chart capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the reusable problem rather than only one application's implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed values and rendered resources
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

