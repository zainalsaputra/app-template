# Example values for a production-oriented Node.js HTTP API.
#
# Assumptions:
# - The application listens on port 3000.
# - Health endpoints are exposed at /health, /health/ready, and /health/live.
# - Sensitive values are provided by an existing Kubernetes Secret.

replicaCount: 2

nameOverride: nodejs-api

image:
  repository: ghcr.io/example/nodejs-api
  tag: "1.0.0"

configMap:
  create: true
  data:
    NODE_ENV: production
    LOG_LEVEL: info
    PORT: "3000"

secret:
  existingSecret: nodejs-api-secrets

container:
  ports:
    http:
      containerPort: 3000
      protocol: TCP

probes:
  startup:
    enabled: true
    httpGet:
      path: /health
      port: http
    periodSeconds: 5
    failureThreshold: 30
  readiness:
    enabled: true
    httpGet:
      path: /health/ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    enabled: true
    httpGet:
      path: /health/live
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

migration:
  enabled: false
  command:
    - npm
  args:
    - run
    - migration:run
